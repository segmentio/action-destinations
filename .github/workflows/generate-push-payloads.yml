name: Generate Push Payloads

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
    paths:
      - 'packages/destination-actions/src/destinations/**'
      - 'packages/browser-destinations/destinations/**'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Destination slug to generate payload for (leave empty for all)'
        required: false
        type: string

jobs:
  generate:
    name: Generate push payload JSON files
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to allow committing back
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Use Github Personal Access Token
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf ssh://git@github.com/

      - name: Install Dependencies
        run: yarn install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: NODE_ENV=production yarn build

      - name: Generate push payloads (all destinations)
        if: ${{ !inputs.slug }}
        run: yarn push-payloads

      - name: Generate push payloads (specific destination)
        if: ${{ inputs.slug }}
        run: yarn push-payloads --slug=${{ inputs.slug }}

      - name: Commit and push payload files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '**/payload.json'
          if git diff --staged --quiet; then
            echo "No changes to payload files, skipping commit."
          else
            git commit -m "chore: update push-payloads [skip ci]"
            git push
          fi
