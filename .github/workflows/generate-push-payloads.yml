name: Generate Metadata Payloads

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      slug:
        description: 'Destination slug to generate metadata for (leave empty for all)'
        required: false
        type: string

jobs:
  generate:
    name: Generate metadata.json files
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Use Github Personal Access Token
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf ssh://git@github.com/

      - name: Install Dependencies
        run: yarn install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: NODE_ENV=production yarn build

      - name: Generate metadata payloads (all destinations)
        if: ${{ !inputs.slug }}
        run: yarn generate:metadata-payload

      - name: Generate metadata payloads (specific destination)
        if: ${{ inputs.slug }}
        env:
          DESTINATION_SLUG: ${{ inputs.slug }}
        run: yarn generate:metadata-payload --slug="$DESTINATION_SLUG"

      - name: Assert metadata payloads are up-to-date
        run: bash scripts/assert-metadata-payload.sh
