name: Build Browser Destinations

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - stage
          - production
      branch:
        description: Branch to build from
        required: true
        type: string
        default: main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    concurrency:
      group: build-browser-destinations-${{ github.event.inputs.environment }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
          ref: ${{ github.event.inputs.branch }}

      - name: Get checkout SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Install Dependencies
        run: yarn install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build Destinations Manifest
        run: yarn nx build @segment/destinations-manifest

      - name: Build Browser Bundles
        working-directory: packages/browser-destinations
        run: ${{ github.event.inputs.environment == 'production' && 'yarn build-web' || 'yarn build-web-stage' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-destinations-${{ github.event.inputs.environment }}-${{ steps.sha.outputs.sha }}
          path: packages/browser-destinations/dist/web/
          if-no-files-found: error
          retention-days: 7
