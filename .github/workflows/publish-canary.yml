name: Publish Canary

on:
  push:
    branches:
      - staging

jobs:
  build-and-publish:
    env:
      HUSKY: 0
      NX_DISABLE_DB: true
    if: startsWith(github.event.head_commit.message, 'Publish') == true
    runs-on: ubuntu-22.04

    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Cache NX
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-nx-${{ hashFiles('**/yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-nx-${{ hashFiles('**/yarn.lock') }}-
            ${{ runner.os }}-node-${{ matrix.node-version }}-nx-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: NODE_ENV=production yarn build

      - name: Set NPM Token
        run: |
          npm set '//registry.npmjs.org/:_authToken' ${{ secrets.NPM_PUBLISH_TOKEN }}
          npm whoami

      - name: Publish
        run: |
          yarn lerna publish from-package --yes --allowBranch=staging --loglevel=verbose --dist-tag canary
