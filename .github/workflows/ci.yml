name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      # See nx recipe: https://nx.dev/recipes/ci/monorepo-ci-github-actions
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0 # nx recipe

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Use Github Personal Access Token
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf ssh://git@github.com/

      - uses: nrwl/nx-set-shas@v3 # nx recipe

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build (Affected)
        run: NODE_ENV=production pnpm nx affected -t build --parallel=3 # nx recipe

      - name: Test (Affected)
        run: pnpm nx affected -t test --parallel=3 --coverage # nx recipe

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: segmentio/action-destinations
          handle_no_reports_found: true # don't fail if no reports are found

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0 # nx recipe

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - uses: nrwl/nx-set-shas@v3 # nx recipe

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build # TODO: This monorepo should be refactored so packages can be linted invidually. "affected" will not work ATM.
        run: NODE_ENV=production pnpm build # nx recipe

      - name: Lint
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: pnpm lint

  validate:
    name: Validate
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0 # nx recipe

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - uses: nrwl/nx-set-shas@v3 # nx recipe

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert yarn.lock is up-to-date
        run: bash scripts/assert-lockfile-updated.sh

      - name: Build # TODO: This monorepo should be refactored so packages can be linted invidually. "affected" will not work ATM.
        run: NODE_ENV=production pnpm build # nx recipe

      - name: Validate Definitions
        run: pnpm validate

      - name: Destination Subscription Size
        run: |
          if $(lerna changed | grep -q destination-subscriptions); then
            pnpm subscriptions size
          fi

      - name: Assert generated types are up-to-date
        run: bash scripts/assert-types-updated.sh

  browser-destination-bundle-qa:
    name: Browser Destination Bundle QA
    # env: # Disable saucelabs - we blew through our quota.
    #   SAUCE_USERNAME: ${{secrets.SAUCE_USERNAME}}
    #   SAUCE_ACCESS_KEY: ${{secrets.SAUCE_ACCESS_KEY}}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: NODE_ENV=production pnpm build:browser-bundles

      - name: Size Limit
        run: pnpm browser size

      # - name: Run Saucelabs Tests
      #   working-directory: packages/browser-destinations-integration-tests
      #   shell: bash
      #   run: |
      #     pnpm start-destination-server &
      #     pnpm test:sauce

  browser-tests-core:
    name: 'Browser tests: actions-core'
    runs-on: ubuntu-22.04

    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Browser Dependencies
        run: npx playwright install-deps

      - name: Build
        run: NODE_ENV=production pnpm exec lerna run build --scope=@segment/actions-core --include-dependencies --stream

      - name: Browser Test
        run: pnpm test-browser

  snyk:
    name: Snyk
    runs-on: ubuntu-22.04

    timeout-minutes: 5

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=upgradable --all-projects --policy-path=.snyk
