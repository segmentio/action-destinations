name: 'Artifactory OIDC Auth'
description: 'Exchange GitHub OIDC token for an Artifactory access token and point npm/yarn at the curated Artifactory registry'

runs:
  using: 'composite'
  steps:
    - name: Exchange OIDC token for Artifactory access token
      shell: bash
      run: |
        # 1. Request a GitHub OIDC JWT with Artifactory as the audience.
        GITHUB_JWT=$(curl -sS \
          -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${ARTIFACTORY_URL}" \
          | jq -r '.value')

        # 2. Exchange it for an Artifactory access token. The body MUST be JSON
        #    and MUST include provider_name, or JFrog issues no token.
        RESP=$(curl -sS "${ARTIFACTORY_URL}/access/api/v1/oidc/token" \
          -H 'Content-Type: application/json' \
          -d "{\"grant_type\":\"urn:ietf:params:oauth:grant-type:token-exchange\",
               \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\",
               \"subject_token\":\"${GITHUB_JWT}\",
               \"provider_name\":\"github-actions\"}")
        ART_TOKEN=$(echo "$RESP" | jq -r '.access_token // empty')

        if [ -z "$ART_TOKEN" ]; then
          echo "::error::OIDC token exchange failed. Raw response (token redacted):"
          echo "$RESP" | jq 'if .access_token then .access_token="<redacted>" else . end' 2>/dev/null || echo "$RESP"
          exit 1
        fi
        echo "::add-mask::$ART_TOKEN"

        # 3. Point npm/yarn at the curated Artifactory registry for this job.
        #    yarn 1.x reads ~/.npmrc for both the registry and the auth token.
        REGISTRY="${ARTIFACTORY_URL}/artifactory/api/npm/virtual-npm-thirdparty/"
        HOST=$(echo "${ARTIFACTORY_URL}" | sed -E 's#^https?://##')
        {
          echo "registry=${REGISTRY}"
          echo "//${HOST}/artifactory/api/npm/virtual-npm-thirdparty/:_authToken=${ART_TOKEN}"
        } > ~/.npmrc
        echo "::notice::npm/yarn configured to use Artifactory registry"
